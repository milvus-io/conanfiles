name: sync to artifactory
description: download package from conan center and upload it and dpendency to jfrog artifactory
on:
  workflow_dispatch:
    inputs:
      package:
        description: 'package name'
        required: true
      version:
        description: 'package version'
        required: true
      repository:
        description: 'Choose Artifactory repository'
        required: false
        type: choice
        options:
          - production
          - testing
        default: 'production'

jobs:
  sync-conan-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Conan
        run: |
          pip install --user conan==2.25.1
          conan --version
          conan profile detect

      - name: Sync to Artifactory
        env:
          JFROG_USERNAME2: ${{ secrets.JFROG_USERNAME2 }}
          JFROG_PASSWORD2: ${{ secrets.JFROG_PASSWORD2 }}
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_REPOSITORY: ${{ github.event.inputs.repository }}
        run: |
          ./scripts/sync-to-artifactory.sh \
            "$INPUT_PACKAGE" \
            "$INPUT_VERSION" \
            --repository "$INPUT_REPOSITORY"
