name: Build and Push

run-name: Build and push ${{ inputs.package }}/${{ inputs.version }}${{ inputs.user_channel && format('@{0}', inputs.user_channel) || '' }} to ${{ inputs.repository }}

on:
  workflow_dispatch:
    inputs:

      package:
        description: 'package name'
        required: true
      version:
        description: 'package version'
        required: true
      
      conanfile_path:
        description: 'the conanfile.py path of the package '
        required: true
        default: 'all/conanfile.py'

      repository:
        description: 'Choose Artifactory repository'
        required: false
        type: choice
        options:
          - production
          - testing
        default: 'production'

      user_channel:
        description: 'define the user and channel for the package '
        required: false
        default: ''

      extra_options:
        description: 'extra conan options (e.g. -o pkg:opt=val -c conf=val)'
        required: false
        default: ''
jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    env:
      CONAN_HOME: /home/runner/work/_temp/conan2
      RUNNER_LABEL: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Conan and dependencies
        run: |
          pip install --user conan==2.25.1 pyyaml
          conan --version
          conan profile detect

      - name: Detect build-and-push C++ standard
        id: cppstd
        env:
          INPUT_EXTRA_OPTIONS: ${{ github.event.inputs.extra_options }}
        run: |
          cppstd=$(sed -nE 's/.*(^|[[:space:]])-s(:[hb])?([=]|[[:space:]]+)compiler\.cppstd=([0-9]+).*/\4/p' <<<"$INPUT_EXTRA_OPTIONS" | tail -n 1)
          if [ -z "$cppstd" ]; then
            cppstd=20
          fi
          case "$cppstd" in
            11|14|17|20|23)
              ;;
            *)
              echo "Unsupported compiler.cppstd value in extra_options: $cppstd. Supported values: 11, 14, 17, 20, 23." >&2
              exit 1
              ;;
          esac
          echo "Using compiler.cppstd=$cppstd"
          echo "cppstd=$cppstd" >> "$GITHUB_OUTPUT"

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ${{ env.CONAN_HOME }}/p
          key: build-and-push-${{ env.RUNNER_LABEL }}-cppstd-${{ steps.cppstd.outputs.cppstd }}-${{ hashFiles('recipes/**/conanfile.py', 'recipes/**/conandata.yml', 'recipes/**/config.yml', 'scripts/build-and-push.sh', '.github/workflows/build-and-push.yml') }}
          restore-keys: |
            build-and-push-${{ env.RUNNER_LABEL }}-cppstd-${{ steps.cppstd.outputs.cppstd }}-

      - name: Build and push
        env:
          JFROG_USERNAME2: ${{ secrets.JFROG_USERNAME2 }}
          JFROG_PASSWORD2: ${{ secrets.JFROG_PASSWORD2 }}
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_CONANFILE: ${{ github.event.inputs.conanfile_path }}
          INPUT_REPOSITORY: ${{ github.event.inputs.repository }}
          INPUT_USER_CHANNEL: ${{ github.event.inputs.user_channel }}
          INPUT_EXTRA_OPTIONS: ${{ github.event.inputs.extra_options }}
        run: |
          ARGS=("$INPUT_PACKAGE" "$INPUT_VERSION" --conanfile "$INPUT_CONANFILE" --repository "$INPUT_REPOSITORY")
          if [ -n "$INPUT_USER_CHANNEL" ]; then
            ARGS+=(--user-channel "$INPUT_USER_CHANNEL")
          fi
          if [ -n "$INPUT_EXTRA_OPTIONS" ]; then
            ARGS+=(--extra-options "$INPUT_EXTRA_OPTIONS")
          fi
          ./scripts/build-and-push.sh "${ARGS[@]}"
