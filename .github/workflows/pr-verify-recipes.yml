name: PR Verification

run-name: "Verify recipes for PR #${{ github.event.pull_request.number }}"

on:
  pull_request:
    paths:
      - 'recipes/**'
      - 'scripts/build-and-push.sh'
      - 'scripts/pr-detection.py'
      - '.github/workflows/pr-verify-recipes.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-recipes:
    name: verify recipe versions
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      CONAN_HOME: /home/runner/work/_temp/conan2
      RUNNER_LABEL: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Conan and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install conan==2.25.1 pyyaml
          conan --version
          conan profile detect

      - name: Detect verification C++ standard
        id: cppstd
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          cppstd=$(sed -n 's/.*recipe-verify-cppstd=\([0-9][0-9]*\).*/\1/p' <<<"$PR_BODY" | tail -n 1)
          if [ -z "$cppstd" ]; then
            cppstd=20
          fi
          case "$cppstd" in
            11|14|17|20|23)
              ;;
            *)
              echo "Unsupported recipe-verify-cppstd value: $cppstd. Supported values: 11, 14, 17, 20, 23." >&2
              exit 1
              ;;
          esac
          echo "cppstd=$cppstd" >> "$GITHUB_OUTPUT"
          echo "Using compiler.cppstd=$cppstd"

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ${{ env.CONAN_HOME }}/p
          key: pr-verify-${{ env.RUNNER_LABEL }}-cppstd-${{ steps.cppstd.outputs.cppstd }}-${{ hashFiles('recipes/**/conanfile.py', 'recipes/**/conandata.yml', 'recipes/**/config.yml', 'scripts/build-and-push.sh', 'scripts/pr-detection.py', '.github/workflows/pr-verify-recipes.yml') }}
          restore-keys: |
            pr-verify-${{ env.RUNNER_LABEL }}-cppstd-${{ steps.cppstd.outputs.cppstd }}-

      - name: Detect recipe versions to verify
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          TARGETS_FILE: ${{ runner.temp }}/recipe-targets.tsv
        run: |
          python3 scripts/pr-detection.py

      - name: Build selected recipe versions
        if: steps.detect.outputs.count != '0'
        env:
          TARGETS_FILE: ${{ runner.temp }}/recipe-targets.tsv
          CPPSTD: ${{ steps.cppstd.outputs.cppstd }}
        run: |
          while IFS=$'\t' read -r package version conanfile; do
            echo "=============================================="
            echo "Verifying ${package}/${version} with C++${CPPSTD}"
            echo "=============================================="

            ARGS=("$package" "$version" --conanfile "$conanfile" --settings-mode runner-default --repository testing --no-upload)
            ARGS+=(--extra-options "-s compiler.cppstd=${CPPSTD} -s:b compiler.cppstd=${CPPSTD}")

            ./scripts/build-and-push.sh "${ARGS[@]}"
          done < "$TARGETS_FILE"
