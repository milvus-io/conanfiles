name: Update Recipe From Dispatch

run-name: update recipe from ${{ github.event.client_payload.source_repo }} ${{ github.event.client_payload.tag }}

on:
  repository_dispatch:
    types:
      - recipe-release

permissions:
  contents: write
  pull-requests: write

jobs:
  update-recipe:
    name: create recipe update PR
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Check bot token
        env:
          CONANFILES_BOT_TOKEN: ${{ secrets.CONANFILES_BOT_TOKEN }}
        run: |
          if [ -z "$CONANFILES_BOT_TOKEN" ]; then
            echo "CONANFILES_BOT_TOKEN is required so generated PRs trigger verification workflows and can be merged." >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install conan==2.25.1 pyyaml
          conan --version
          conan profile detect

      - name: Generate recipe update
        id: update
        env:
          TAG: ${{ github.event.client_payload.tag }}
          COMMIT: ${{ github.event.client_payload.commit }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
        run: |
          python3 scripts/update-recipe-from-dispatch.py

      - name: Validate generated files
        if: steps.update.outputs.changed == 'true'
        run: |
          git diff --check
          git diff -- "${{ steps.update.outputs.recipe_config_path }}" "${{ steps.update.outputs.conandata_path }}"

      - name: Export recipe
        if: steps.update.outputs.changed == 'true'
        run: |
          conan export "recipes/${{ steps.update.outputs.package }}/${{ steps.update.outputs.conanfile_path }}" \
            --version="${{ steps.update.outputs.recipe_version }}" \
            --user=milvus \
            --channel=dev

      - name: Create or update pull request
        id: cpr
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CONANFILES_BOT_TOKEN }}
          branch: automation/${{ steps.update.outputs.package }}-${{ steps.update.outputs.recipe_version }}
          delete-branch: true
          signoff: true
          title: Add ${{ steps.update.outputs.package }} ${{ steps.update.outputs.recipe_version }}
          commit-message: Add ${{ steps.update.outputs.package }} ${{ steps.update.outputs.recipe_version }}
          body: |
            ## Summary
            - Add `${{ steps.update.outputs.package }}/${{ steps.update.outputs.recipe_version }}@milvus/dev`.
            - Source repo: `${{ github.event.client_payload.source_repo }}`.
            - Source tag: `${{ github.event.client_payload.tag }}`.
            - Source commit: `${{ github.event.client_payload.commit }}`.
            - Source URL: `${{ steps.update.outputs.url }}`.
            - Source SHA256: `${{ steps.update.outputs.sha256 }}`.

            ## Validation
            - `git diff --check`
            - `conan export recipes/${{ steps.update.outputs.package }}/${{ steps.update.outputs.conanfile_path }} --version=${{ steps.update.outputs.recipe_version }} --user=milvus --channel=dev`

      - name: Wait for required checks and merge pull request
        if: steps.update.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.CONANFILES_BOT_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          deadline=$((SECONDS + 7200))
          required_checks=("verify recipe versions" "DCO")

          while [ "$SECONDS" -lt "$deadline" ]; do
            pr_state=$(gh pr view "$PR_NUMBER" --json state --jq '.state')
            if [ "$pr_state" != "OPEN" ]; then
              echo "Pull request #$PR_NUMBER is $pr_state before required checks passed" >&2
              exit 1
            fi

            checks_json=$(gh pr checks "$PR_NUMBER" --json name,bucket,state,conclusion 2>/dev/null || true)
            if ! jq -e 'type == "array"' >/dev/null 2>&1 <<<"$checks_json"; then
              checks_json="[]"
            fi
            all_passed=true

            for check in "${required_checks[@]}"; do
              result=$(jq -r --arg check "$check" '.[] | select(.name == $check) | [.bucket, .state, .conclusion] | @tsv' <<<"$checks_json" | tail -n 1 || true)
              if [ -z "$result" ]; then
                all_passed=false
                continue
              fi

              bucket=$(cut -f1 <<<"$result")
              state=$(cut -f2 <<<"$result")
              conclusion=$(cut -f3 <<<"$result")

              case "$bucket" in
                pass)
                  ;;
                fail|cancel|skipping)
                  echo "$check did not pass: bucket=$bucket state=$state conclusion=$conclusion" >&2
                  exit 1
                  ;;
                *)
                  all_passed=false
                  ;;
              esac
            done

            if [ "$all_passed" = true ]; then
              gh pr merge "$PR_NUMBER" --rebase --delete-branch
              exit 0
            fi

            sleep 30
          done

          echo "Timed out waiting for required checks on pull request #$PR_NUMBER" >&2
          exit 1
